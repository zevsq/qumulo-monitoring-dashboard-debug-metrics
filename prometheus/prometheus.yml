global:
    # The frequency of scraping data in Prometheus. Lower values increase the number of data points 
    # and data freshness, at the cost of storage. If you change this value, also update the scrape 
    # interval in the Grafana data source.
    scrape_interval: 15s
    scrape_timeout: 10s

scrape_configs:
  # per-socket TCP stats (RTT, retransmits, queue depth) for hub/spoke portal replication links.
  - job_name: 'qumulo-portal-rpc-socket'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['portal-rpc-socket-exporter:9840']

  # Scrape Prometheus for OpenMetrics data.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
